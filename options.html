<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HDRezka Plugin Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      background-color: #f4f7f6;
      color: #333;
      line-height: 1.6;
    }
    h1 {
      color: #2c3e50;
      text-align: center;
      margin-bottom: 30px;
    }
    div {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #555;
    }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background-color: #fff;
      font-size: 16px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
    }
    button {
      padding: 12px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      margin-bottom: 10px;
    }
    button:hover {
      background-color: #0056b3;
    }
    .secondary-button {
      background-color: #f39c12;
    }
    .secondary-button:hover {
      background-color: #d98200;
    }
    #status {
      margin-top: 20px;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      font-size: 15px;
      min-height: 20px;
    }
    .success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    #favoritesFileInput {
      display: none;
    }
  </style>
</head>
<body>
  <h1>HDRezka Plugin Settings</h1>
  <div>
    <label for="nextEpisodeKey">Next episode key:</label>
    <select id="nextEpisodeKey"></select>
  </div>
  <button id="saveButton">Save Settings</button>
  <button id="exportFavoritesButton" class="secondary-button">Export Favorites</button>
  <button id="importFavoritesButton" class="secondary-button">Import Favorites</button>
  <input id="favoritesFileInput" type="file" accept="application/json,.json">
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
